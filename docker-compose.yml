services:
  db:
    image: postgres:15
    container_name: irya-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: irya_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: irya-api
    command: npm run dev
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"

volumes:
  postgres_data:
